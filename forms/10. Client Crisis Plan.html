<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Crisis Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .signature-line { height: 2.5rem; border-bottom: 1px solid #4b5563; margin-top: 0.25rem; }
        .form-container { max-width: 960px; margin: 2rem auto; padding: 2rem; background-color: #ffffff; border-radius: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .form-label { font-weight: 600; color: #111827; margin-bottom: 0.5rem; display: block; }
        .form-input, .form-textarea, .form-select { display: block; width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; background-color: #ffffff; transition: all 0.2s; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.5); }
        .form-input:read-only { background-color: #f3f4f6; cursor: not-allowed; }
        .form-button { display: inline-block; padding: 0.75rem 1.5rem; font-weight: 600; color: #ffffff; border-radius: 0.75rem; transition: all 0.2s; cursor: pointer; border: none; }
        .form-button:hover { opacity: 0.9; }
        .nav-link { display: block; padding: 0.5rem 1rem; border-radius: 0.5rem; margin-bottom: 0.5rem; font-weight: 500; color: #4b5563; background-color: #f3f4f6; transition: background-color 0.2s; text-decoration: none; }
        .nav-link:hover { background-color: #e5e7eb; }
        .nav-container { position: fixed; top: 2rem; left: 2rem; width: 250px; z-index: 10; display: none; max-height: calc(100vh - 4rem); overflow-y: auto; padding-right: 8px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 1.5rem; border-radius: 1rem; max-width: 600px; width: 90%; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-body { overflow-y: auto; }
        .modal-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; transition: background-color 0.2s; }
        .modal-item:hover { background-color: #f3f4f6; }
        .delete-btn { background-color: #ef4444; color: white; border: none; padding: 0.25rem 0.75rem; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; }
        .delete-btn:hover { background-color: #dc2626; }
        @media (min-width: 1024px) { .nav-container { display: block; } .form-container { margin-left: 280px; } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="nav-container">
        <a href="../index.html" class="nav-link font-bold text-blue-600 hover:bg-blue-100 mb-4">← Forms Home</a>
        <h3 class="font-bold text-gray-900 mb-2">Form Sections</h3>
        <nav id="form-nav"></nav>
    </div>

    <div class="form-container">
        <form id="crisisPlanForm" class="p-0">
            <input type="hidden" id="formId" value="client-crisis-plan-v1">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Client Crisis Plan</h1>
                <p class="text-gray-500">Watson Community Health Centre</p>
            </div>

            <div id="section-1" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Client Details</h3><div class="grid grid-cols-1 md:grid-cols-4 gap-6"><div><label for="clientName" class="form-label">Name</label><input type="text" id="clientName" name="clientName" class="form-input"></div><div><label for="dob" class="form-label">DOB</label><input type="date" id="dob" name="dob" class="form-input"></div><div><label for="diagnosis" class="form-label">Diagnosis</label><input type="text" id="diagnosis" name="diagnosis" class="form-input"></div><div><label for="dateOfPlan" class="form-label">Date of Plan</label><input type="date" id="dateOfPlan" name="dateOfPlan" class="form-input"></div></div></div>
            <div id="section-2" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Contact Information</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div><label for="physicianName" class="form-label">Physician Name</label><input type="text" id="physicianName" name="physicianName" class="form-input"></div><div><label for="physicianNumber" class="form-label">Physician Number</label><input type="text" id="physicianNumber" name="physicianNumber" class="form-input"></div><div><label for="pharmacyName" class="form-label">Pharmacy Name</label><input type="text" id="pharmacyName" name="pharmacyName" class="form-input"></div><div><label for="pharmacyNumber" class="form-label">Pharmacy Number</label><input type="text" id="pharmacyNumber" name="pharmacyNumber" class="form-input"></div></div></div>
            <div id="section-3" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Medications</h3><div id="medication-list" class="space-y-4"></div></div>
            <div id="section-4" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Crisis Details</h3><div><label for="immediateNeeds" class="form-label">Description of immediate needs:</label><textarea id="immediateNeeds" name="immediateNeeds" class="form-textarea" rows="3"></textarea></div><div class="mt-4"><label for="safetyConcerns" class="form-label">Safety Concerns:</label><textarea id="safetyConcerns" name="safetyConcerns" class="form-textarea" rows="3"></textarea></div><div class="mt-4"><label for="goal" class="form-label">Goal:</label><textarea id="goal" name="goal" class="form-textarea" rows="3"></textarea></div></div>
            <div id="section-5" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Plan Details</h3><div id="plan-table" class="space-y-4"></div></div>
            <div id="section-6" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Resources</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div><label for="advocacyGroup" class="form-label">Advocacy Group</label><input type="text" id="advocacyGroup" name="advocacyGroup" class="form-input"></div><div><label for="supportGroup" class="form-label">Support Group</label><input type="text" id="supportGroup" name="supportGroup" class="form-input"></div><div><label for="mhAgency" class="form-label">MH Agency</label><input type="text" id="mhAgency" name="mhAgency" class="form-input"></div><div><label for="otherResource" class="form-label">Other</label><input type="text" id="otherResource" name="otherResource" class="form-input"></div></div></div>
            <div id="section-7" class="mb-6"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Signatures</h3><div id="signature-container" class="space-y-6"></div></div>

            <div id="loadModal" class="modal-overlay hidden"><div class="modal-content"><h3 class="text-lg font-bold mb-4">Load Saved Crisis Plan</h3><input type="search" id="modalSearch" placeholder="Search by client name..." onkeyup="filterModalItems()" class="w-full p-2 mb-4 border border-gray-300 rounded-md"><div id="savedFormsList" class="modal-body"></div><div class="mt-4 text-right"><button onclick="closeModal()" class="form-button bg-gray-500 hover:bg-gray-600">Cancel</button></div></div></div>
            
            <div class="button-container mt-8 flex flex-col items-center gap-4">
                <div class="flex flex-wrap justify-center gap-4"><button type="button" onclick="displaySavedForms()" class="form-button bg-yellow-500 hover:bg-yellow-600 text-black">Load Saved Data</button><button type="button" onclick="saveToLocalStorage()" class="form-button bg-green-600 hover:bg-green-700">Save Progress</button><button type="button" onclick="printForm()" class="form-button bg-blue-600 hover:bg-blue-700">Print Summary</button></div>
                <div class="flex flex-wrap justify-center gap-4"><input type="file" id="importFile" onchange="importData(event)" accept=".json" style="display: none;"><button type="button" onclick="document.getElementById('importFile').click()" class="form-button bg-gray-600 hover:bg-gray-700">Import from File</button><button type="button" onclick="exportData()" class="form-button bg-gray-600 hover:bg-gray-700">Export to File</button></div>
                <div><button type="button" onclick="clearForm()" class="form-button bg-red-600 hover:bg-red-700">Clear Form</button></div>
            </div>
        </form>
    </div>

    <script>
        // --- CONFIGURATION ---
        const FORM_ID = 'client-crisis-plan-v1';
        const FORM_NAME_PRINT = 'Client Crisis Plan';
        const FORM_ELEMENT_ID = 'crisisPlanForm';

        // --- PRINT FUNCTION ---
        function printForm() {
            const data = getFormData();
            const getValue = (key, fallback = '') => data[key] ? (String(data[key]).trim()) : fallback;
            const formatDate = (d) => { if (!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return ''; const [y,m,dy] = d.split('-'); return `${m}/${dy}/${y}`; };
            
            const createField = (label, value) => `<div class="field"><span class="label">${label}</span><div class="value">${value || '&nbsp;'}</div></div>`;
            const createFieldLong = (label, value) => `<div class="field full-width"><span class="label">${label}</span><div class="value value-long">${value || '&nbsp;'}</div></div>`;

            let medicationHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (getValue(`med_name_${i}`)) {
                    medicationHtml += `<li><strong>${getValue(`med_name_${i}`)}:</strong> ${getValue(`med_dosage_${i}`)}</li>`;
                }
            }
            
            let planHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (getValue(`objective_${i}`)) {
                    planHtml += `<tr><td>${getValue(`objective_${i}`)}</td><td>${getValue(`intervention_${i}`)}</td><td>${getValue(`frequency_${i}`)}</td><td>${getValue(`service_${i}`)}</td><td>${formatDate(getValue(`start_date_${i}`))}</td><td>${formatDate(getValue(`review_date_${i}`))}</td></tr>`;
                }
            }

            let printContents = `<html><head><title>${FORM_NAME_PRINT} - ${getValue('clientName')}</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
            <style>body{font-family:'Inter',sans-serif;font-size:10pt;color:#333;margin:0;background-color:#e0e0e0}.page-content{width:8.5in;min-height:11in;padding:0.75in;box-sizing:border-box;background-color:white;margin:2rem auto;box-shadow:0 0 10px rgba(0,0,0,0.2)}@media print{body{background-color:white;padding:0}.page-content{margin:0;box-shadow:none;min-height:0}.footer{position:fixed;bottom:0.75in;left:0.75in;right:0.75in;width:calc(8.5in - 1.5in)}h3.section-title,.data-table,.field,.signature-section{page-break-inside:avoid}}.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:2px solid #000080}.footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:2px solid #000080;font-size:8pt;color:#666;margin-top:20px}.logo{width:150px;height:auto}.header-title{text-align:right}.header-title h1{margin:0;font-size:16pt;color:#000080;font-weight:700}.header-title h2{margin:0;font-size:10pt;font-weight:400;color:#555}h3.section-title{font-size:12pt;font-weight:600;color:#333;background-color:#f0f5fa;padding:8px 12px;margin:20px 0 15px 0;border-left:4px solid #000080}.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}.grid-4col{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px 20px}.field .label{font-weight:600;font-size:9pt;color:#444;display:block;margin-bottom:4px}.field .value{background:#f9f9f9;padding:6px 10px;border-radius:4px;border:1px solid #eee;min-height:1.2em;word-wrap:break-word;}.field .value ul{list-style:none;padding:0;margin:0}.field .value-long{white-space:pre-wrap;min-height:3em}.full-width{grid-column:1 / -1}.data-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:9pt}.data-table th,.data-table td{border:1px solid #ddd;padding:6px;text-align:left;vertical-align:top;}.data-table th{background-color:#f2f2f2;font-weight:600}.signature-section{margin-top:30px;padding-bottom:60px; page-break-before:auto;}.signature-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:25px;align-items:end;}.signature-box{margin-top:15px;}.signature-line{border-bottom:1px solid #333;height:40px;margin-bottom:5px}.signature-label{font-size:8pt;color:#555}</style>
            </head><body><div class="page-content">
            <div class="header"><img src="../images/goldlogo.png" alt="Company Logo" class="logo"><div class="header-title"><h1>${FORM_NAME_PRINT}</h1><h2>Watson Community Health Centre</h2></div></div>
            <h3 class="section-title">Client Details</h3><div class="grid-4col">${createField('Name',getValue('clientName'))}${createField('DOB',formatDate(getValue('dob')))}${createField('Diagnosis',getValue('diagnosis'))}${createField('Date of Plan',formatDate(getValue('dateOfPlan')))}</div>
            <h3 class="section-title">Contact Information</h3><div class="grid-2col">${createField('Physician Name',getValue('physicianName'))}${createField('Physician Number',getValue('physicianNumber'))}${createField('Pharmacy Name',getValue('pharmacyName'))}${createField('Pharmacy Number',getValue('pharmacyNumber'))}</div>
            <h3 class="section-title">Medications</h3><div class="field"><div class="value"><ul>${medicationHtml || '<li>No medications listed.</li>'}</ul></div></div>
            <h3 class="section-title">Crisis Details</h3>${createFieldLong('Description of immediate needs:', getValue('immediateNeeds'))}${createFieldLong('Safety Concerns:', getValue('safetyConcerns'))}${createFieldLong('Goal:', getValue('goal'))}
            <h3 class="section-title">Plan Details</h3><table class="data-table"><thead><tr><th>Objective</th><th>Intervention</th><th>Frequency</th><th>Service</th><th>Start Date</th><th>Review Date</th></tr></thead><tbody>${planHtml || '<tr><td colspan="6">No plan details entered.</td></tr>'}</tbody></table>
            <h3 class="section-title">Resources</h3><div class="grid-2col">${createField('Advocacy Group',getValue('advocacyGroup'))}${createField('Support Group',getValue('supportGroup'))}${createField('MH Agency',getValue('mhAgency'))}${createField('Other',getValue('otherResource'))}</div>
            <h3 class="section-title">Signatures</h3><div class="signature-section"><div class="signature-grid"><div class="signature-box"><div class="signature-line"></div><div class="signature-label">Client: ${getValue('sig_print_0')}<br>Date: ${formatDate(getValue('sig_date_0'))}</div></div><div class="signature-box"><div class="signature-line"></div><div class="signature-label">Guardian/Other: ${getValue('sig_print_1')}<br>Date: ${formatDate(getValue('sig_date_1'))}</div></div><div class="signature-box"><div class="signature-line"></div><div class="signature-label">WCHC Staff: ${getValue('sig_print_2')}<br>Date: ${formatDate(getValue('sig_date_2'))}</div></div></div></div>
            <div class="footer"><span>Client: ${getValue('clientName')}</span><span>DOB: ${formatDate(getValue('dob'))}</span></div>
            </div></body></html>`;

            const printWindow=window.open('','_blank');printWindow.document.write(printContents);printWindow.document.close();printWindow.focus();setTimeout(()=>{printWindow.print()},500)
        }
        
        // --- UNIVERSAL FUNCTIONS ---
        function getFormData(){const form=document.getElementById(FORM_ELEMENT_ID);const formData=new FormData(form);const data={formId:FORM_ID,lastModified:new Date().toISOString()};for(const[key,value]of formData.entries()){const cleanKey=key.replace(/\[\]$/,'');if(key.endsWith('[]')){if(!data[cleanKey])data[cleanKey]=[];data[cleanKey].push(value)}else{data[key]=value}}return data}
        function populateForm(data){const form=document.getElementById(FORM_ELEMENT_ID);form.reset();for(const key in data){if(key==='formId'||key==='lastModified')continue;const elements=form.elements[key]||form.elements[key+'[]'];if(!elements)continue;const value=data[key];const elementList=elements.nodeName?[elements]:Array.from(elements);const firstEl=elementList[0];if(firstEl.type==='checkbox'){const values=Array.isArray(value)?value:[value];elementList.forEach(el=>{el.checked=values.includes(el.value)})}else if(firstEl.type==='radio'){elementList.forEach(el=>{if(el.value===value)el.checked=true})}else{if(firstEl.value!==undefined)firstEl.value=value}}if(document.getElementById('dob'))document.getElementById('dob').dispatchEvent(new Event('input'))}
        function saveToLocalStorage(){const data=getFormData();const clientName=data.clientName.trim();if(!clientName){alert('Please enter a Client Name before saving.');return}const key=`savedForm_${FORM_ID}_${clientName}`;try{localStorage.setItem(key,JSON.stringify(data));alert(`Progress for ${clientName} saved successfully!`)}catch(e){if(e.name==='QuotaExceededError'){alert('Error: Browser storage is full. Please export and then delete some older saved forms to make space.')}else{alert('An unknown error occurred while saving.');console.error(e)}}}
        function displaySavedForms(){const savedFormsList=document.getElementById('savedFormsList');savedFormsList.innerHTML='';let savedItems=[];for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key.startsWith(`savedForm_${FORM_ID}_`)){try{const data=JSON.parse(localStorage.getItem(key));savedItems.push({key,data})}catch(e){console.error('Could not parse saved data:',key,e)}}}savedItems.sort((a,b)=>new Date(b.data.lastModified)-new Date(a.data.lastModified));if(savedItems.length===0){savedFormsList.innerHTML=`<p class="text-gray-500">No saved forms found in this browser.</p>`}else{savedItems.forEach(item=>{const clientName=item.data.clientName||'Unnamed';const lastModified=new Date(item.data.lastModified).toLocaleString();const itemDiv=document.createElement('div');itemDiv.className='modal-item';itemDiv.innerHTML=`<div class="flex-grow" onclick="loadSelectedForm('${item.key}')"><strong class="item-name">${clientName}</strong><br><small>Last saved: ${lastModified}</small></div><button onclick="deleteSavedForm(event,'${item.key}')"class="delete-btn">Delete</button>`;savedFormsList.appendChild(itemDiv)})}document.getElementById('loadModal').classList.remove('hidden');document.getElementById('modalSearch').value='';document.getElementById('modalSearch').focus()}
        function filterModalItems(){const searchTerm=document.getElementById('modalSearch').value.toLowerCase();document.querySelectorAll('.modal-item').forEach(item=>{const name=item.querySelector('.item-name').textContent.toLowerCase();item.style.display=name.includes(searchTerm)?'flex':'none'})}
        function loadSelectedForm(key){const data=JSON.parse(localStorage.getItem(key));populateForm(data);closeModal();alert(`Data for ${data.clientName} has been loaded.`)}
        function deleteSavedForm(event,key){event.stopPropagation();const data=JSON.parse(localStorage.getItem(key));const clientName=data.clientName||'this entry';if(confirm(`Are you sure you want to permanently delete the saved data for ${clientName}? This cannot be undone.`)){localStorage.removeItem(key);displaySavedForms();filterModalItems()}}
        function closeModal(){document.getElementById('loadModal').classList.add('hidden')}
        function parseClientName(nameStr){let[lastName,firstName]=['Unknown','Client'];if(nameStr){if(nameStr.includes(',')){[lastName,firstName]=nameStr.split(',',2).map(s=>s.trim())}else{const parts=nameStr.trim().split(' ');lastName=parts.pop()||'Unknown';firstName=parts.join(' ')||'Client'}}return[lastName,firstName]}
        function exportData(){const data=getFormData();if(!data.clientName.trim()){alert('Please enter a Client Name before exporting.');return}const[lastName,firstName]=parseClientName(data.clientName);const filename=`${formatDate(data.dateOfPlan)||'NODATE'}_${lastName}_${firstName}_${FORM_ID}.json`;const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=filename;link.click();URL.revokeObjectURL(link.href)}
        function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(data.formId!==FORM_ID){alert(`Error: Incompatible File\n\nThis file is for the '${data.formId||'Unknown Form'}'. You are currently on the '${FORM_ID}' form.`);return}populateForm(data);alert('Client data imported successfully from file!')}catch(error){alert('An error occurred while reading this file.');console.error("Import Error: ",error)}};reader.readAsText(file);event.target.value=''}
        function clearForm(){if(confirm("Are you sure you want to clear all fields on this form? This cannot be undone.")){document.getElementById(FORM_ELEMENT_ID).reset();initializeFormDefaults();alert('Form has been cleared.')}}
        
        // --- FORM-SPECIFIC HELPER FUNCTIONS ---
        function initializeFormDefaults(){
            const dateInput = document.getElementById('dateOfPlan');
            if(dateInput) dateInput.valueAsDate = new Date();
            syncSignatureDates();
        }
        function syncSignatureDates() {
            const mainDate = document.getElementById('dateOfPlan').value;
            document.querySelectorAll('input[name^="sig_date_"]').forEach(input => {
                input.value = mainDate;
            });
        }
        function createNavigation() {
            const navContainer = document.getElementById('form-nav');
            const sections = document.querySelectorAll('div[id^="section-"]');
            sections.forEach(section => {
                const title = section.querySelector('h3')?.textContent;
                if (title) {
                    const link = document.createElement('a');
                    link.href = `#${section.id}`;
                    link.className = 'nav-link';
                    link.textContent = title;
                    link.onclick = e => { e.preventDefault(); section.scrollIntoView({ behavior: 'smooth', block: 'start' }); };
                    navContainer.appendChild(link);
                }
            });
        }
        function createMedicationList(count = 5) {
            const container = document.getElementById('medication-list');
            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'grid grid-cols-1 md:grid-cols-3 gap-4 items-center';
                div.innerHTML = `<label class="text-sm font-medium text-gray-500">Medication ${i}:</label><input type="text" name="med_name_${i}" class="form-input md:col-span-1" placeholder="Name"><input type="text" name="med_dosage_${i}" class="form-input md:col-span-1" placeholder="Dosage/Frequency">`;
                container.appendChild(div);
            }
        }
        function createPlanTable(count = 5) {
            const container = document.getElementById('plan-table');
            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'p-4 border rounded-lg';
                div.innerHTML = `<h4 class="font-semibold mb-2">Objective #${i}</h4><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="md:col-span-3"><label class="form-label text-sm">Objective</label><textarea name="objective_${i}" class="form-textarea" rows="2"></textarea></div><div class="md:col-span-3"><label class="form-label text-sm">Intervention</label><textarea name="intervention_${i}" class="form-textarea" rows="2"></textarea></div><div><label class="form-label text-sm">Frequency</label><input type="text" name="frequency_${i}" class="form-input"></div><div><label class="form-label text-sm">Service Utilized</label><input type="text" name="service_${i}" class="form-input"></div><div><label class="form-label text-sm">Start Date</label><input type="date" name="start_date_${i}" class="form-input"></div><div><label class="form-label text-sm">Review Date</label><input type="date" name="review_date_${i}" class="form-input"></div></div>`;
                container.appendChild(div);
            }
        }
        function createSignatureBlocks() {
            const container = document.getElementById('signature-container');
            const roles = ['Client', 'Guardian/Other', 'WCHC Staff'];
            roles.forEach((role, i) => {
                const div = document.createElement('div');
                div.className = 'grid grid-cols-1 md:grid-cols-3 gap-4 items-end';
                div.innerHTML = `<div><label class="form-label">${role} (Print)</label><input type="text" name="sig_print_${i}" class="form-input"></div><div><label class="form-label">${role} (Sign)</label><div class="bg-gray-100 h-12 border rounded"></div></div><div><label class="form-label">Date</label><input type="date" name="sig_date_${i}" class="form-input"></div>`;
                container.appendChild(div);
            });
        }
        
        // --- PAGE INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            createNavigation();
            createMedicationList();
            createPlanTable();
