<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Watson Community Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .brand-blue { color: #000080; }
        .bg-brand-blue { background-color: #000080; }
        .hover\:bg-brand-blue-dark:hover { background-color: #00005a; }
        .border-brand-gold { border-color: #d3af37; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto max-w-2xl py-12 px-4">
        
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold brand-blue">Submit Feedback</h1>
            <p class="text-gray-600 mt-2">We value your input. Let us know how we can improve.</p>
        </header>

        <main class="bg-white p-8 rounded-xl shadow-lg border-t-8 border-brand-gold">
            <form action="https://formspree.io/f/mpwyanow" method="POST">
                <div class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">Your Name</label>
                        <input type="text" name="name" id="name" required class="mt-1 block w-full rounded-md border-2 border-gray-600 shadow-sm focus:border-brand-blue focus:ring focus:ring-brand-blue focus:ring-opacity-50">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Your Email Address</label>
                        <input type="email" name="email" id="email" required class="mt-1 block w-full rounded-md border-2 border-gray-600 shadow-sm focus:border-brand-blue focus:ring focus:ring-brand-blue focus:ring-opacity-50">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Type of Feedback</label>
                        <div class="mt-2 space-y-2">
                            <div class="flex items-center">
                                <input id="type_bug" name="Feedback Type" type="radio" value="Bug Report" required class="h-4 w-4 text-brand-blue focus:ring-brand-blue border-gray-400">
                                <label for="type_bug" class="ml-3 block text-sm font-medium text-gray-700">Bug Report</label>
                            </div>
                            <div class="flex items-center">
                                <input id="type_feature" name="Feedback Type" type="radio" value="Feature Request" class="h-4 w-4 text-brand-blue focus:ring-brand-blue border-gray-400">
                                <label for="type_feature" class="ml-3 block text-sm font-medium text-gray-700">Feature Request</label>
                            </div>
                            <div class="flex items-center">
                                <input id="type_comment" name="Feedback Type" type="radio" value="General Comment" class="h-4 w-4 text-brand-blue focus:ring-brand-blue border-gray-400">
                                <label for="type_comment" class="ml-3 block text-sm font-medium text-gray-700">General Comment</label>
                            </div>
                            <div class="flex items-center">
                                <input id="type_other" name="Feedback Type" type="radio" value="Other" class="h-4 w-4 text-brand-blue focus:ring-brand-blue border-gray-400">
                                <label for="type_other" class="ml-3 block text-sm font-medium text-gray-700">Other</label>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="related_form" class="block text-sm font-medium text-gray-700">Which Form Does This Relate To?</label>
                        <select id="related_form" name="Related Form" class="mt-1 block w-full rounded-md border-2 border-gray-600 shadow-sm focus:border-brand-blue focus:ring focus:ring-brand-blue focus:ring-opacity-50">
                            <option>Please select one...</option>
                            <option>1. Adult Diagnostic Evaluation</option>
                            <option>2. Mental Health ITP</option>
                            <option>3. Child Diagnostic Evaluation</option>
                            <option>4. Diagnostic Evaluation Update</option>
                            <option>5. Integrated ITP</option>
                            <option>6. SUD Assessment (SUDA)</option>
                            <option>7. SUD Individual Treatment Plan</option>
                            <option>8. Consent Packet</option>
                            <option>9. Client Safety Plan</option>
                            <option>10. Client Crisis Plan</option>
                            <option>Other / Not Applicable</option>
                        </select>
                    </div>

                    <div>
                        <label for="feedback" class="block text-sm font-medium text-gray-700">Please describe the issue or suggestion in detail</label>
                        <textarea id="feedback" name="feedback" rows="5" required class="mt-1 block w-full rounded-md border-2 border-gray-600 shadow-sm focus:border-brand-blue focus:ring focus:ring-brand-blue focus:ring-opacity-50"></textarea>
                    </div>
                </div>

                <div class="mt-8">
                    <button type="submit" class="w-full bg-brand-blue text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-brand-blue-dark transition-colors duration-300">
                        Send Feedback
                    </button>
                </div>
            </form>
            <div class="text-center mt-6">
                <a href="../index.html" class="text-sm text-gray-500 hover:text-brand-blue hover:underline">&larr; Back to Forms List</a>
            </div>
        </main>

    </div>
</body>
</html>
